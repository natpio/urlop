<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQM LOGISTICS | Vantage Intelligence v4.3.1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap');
        
        :root { 
            --bg-dark: #030508;
            --sqm-blue: #1a365d;
            --sqm-accent: #ed8936;
            --glass-white: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at 70% 20%, #1e293b 0%, #030508 100%);
            color: #e2e8f0; margin: 0; display: flex; height: 100vh; overflow: hidden; 
        }
        
        /* SIDEBAR - DARK GLASS */
        .sidebar { 
            width: 360px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px);
            border-right: 1px solid var(--border); padding: 40px 30px; display: flex; flex-direction: column; 
            overflow-y: auto;
        }

        .logo-box h2 { 
            font-weight: 900; color: #fff; letter-spacing: 1px; margin: 0;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .lang-switch { display: flex; gap: 8px; margin-bottom: 25px; margin-top: 10px; }
        .lang-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #94a3b8; 
            border-radius: 8px; padding: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; flex: 1;
        }
        .lang-btn.active { background: var(--sqm-accent); color: white; border-color: var(--sqm-accent); }

        label { color: var(--sqm-accent); font-weight: 700; font-size: 0.75rem; letter-spacing: 1px; display: block; margin-bottom: 5px; text-transform: uppercase; }
        
        input, select { 
            width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.07); 
            border: 1px solid var(--border); color: #fff; border-radius: 12px; padding: 12px; margin-bottom: 20px;
            font-family: 'Outfit', sans-serif;
        }
        input:focus, select:focus { border-color: var(--sqm-accent); outline: none; background: rgba(255,255,255,0.12); }
        option { background: #1e293b; color: white; }

        .btn-main { 
            background: linear-gradient(135deg, #ed8936 0%, #f6ad55 100%); color: white; 
            border: none; padding: 18px; border-radius: 14px; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 20px rgba(237, 137, 54, 0.2); transition: 0.3s; text-transform: uppercase;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(237, 137, 54, 0.4); }

        /* CONTENT AREA */
        .content { flex: 1; padding: 40px; overflow-y: auto; }

        .dashboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--glass-white); border-radius: 20px; padding: 20px; color: var(--text-main); border: 1px solid rgba(255,255,255,0.5); }
        .card-label { color: #64748b; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; }
        .card-value { color: var(--sqm-blue); font-weight: 900; font-size: 1.3rem; margin-top: 5px; }

        .table-container { background: var(--glass-white); border-radius: 24px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.5); }
        table { width: 100%; border-collapse: collapse; color: var(--text-main); }
        th { background: #f8fafc; padding: 20px; text-align: left; font-size: 0.75rem; color: #475569; border-bottom: 1px solid #e2e8f0; text-transform: uppercase; }
        td { padding: 20px; border-bottom: 1px solid #f1f5f9; font-weight: 500; }

        .row-sqm { background-color: rgba(237, 137, 54, 0.04); border-left: 6px solid var(--sqm-accent); }
        .price-col { color: var(--sqm-accent); font-weight: 900; font-size: 1.2rem; text-align: right; }
        
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; display: inline-block; margin-bottom: 5px; }
        .badge-sqm { background: var(--sqm-blue); color: white; }
        .badge-ext { background: #e2e8f0; color: #475569; }

        .util-bg { background: #e2e8f0; height: 6px; border-radius: 4px; width: 100px; display: inline-block; margin-right: 10px; }
        .util-fill { height: 100%; background: var(--sqm-accent); border-radius: 4px; transition: 0.5s; }

        .extra-panel { margin-top: 30px; background: #fff; border-radius: 20px; padding: 30px; border-top: 5px solid var(--sqm-accent); color: var(--text-main); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .extra-item { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 5px; color: var(--sqm-blue); }
        .extra-sub { font-size: 0.75rem; color: #64748b; margin-bottom: 15px; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
        
        .breakdown-text { font-size: 10px; color: #94a3b8; display: block; margin-top: 4px; font-weight: 400; }
        .disclaimer { margin-top: 20px; padding: 15px; background: rgba(237, 137, 54, 0.1); border-left: 4px solid var(--sqm-accent); color: #fff; font-size: 0.85rem; border-radius: 0 10px 10px 0; }
    </style>
</head>

<div class="sidebar">
    <div class="logo-box">

    <div style="margin-top: 20px;">

            <button class="lang-btn" onclick="setLang('en')">EN</button>

    <select id="citySelect" onchange="calculate()"></select>
    
    <label data-i18n="weight">Waga całkowita (KG)</label>
    <input type="number" id="weight" value="1000" oninput="calculate()">

    <label data-i18n="dates">Czas eventu (Overlay)</label>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 0;">

    <label data-i18n="mode">Model rozliczenia</label>

        <option value="prop" data-i18n="mode_prop">Doładunek</option>

</div>

let currentLang = 'pl';
const parkingDailyRate = 30;

function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('onclick').includes(lang));
    });
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        el.innerText = translations[lang][key];
    });
    calculate();
}

const select = document.getElementById('citySelect');
Object.keys(rates["WŁASNY SQM BUS"].exp).sort().forEach(c => {
    let o = document.createElement('option'); o.value = c; o.textContent = c;
    select.appendChild(o);
});

function calculate() {
    const city = select.value;
    const weight = parseFloat(document.getElementById('weight').value) || 0;
    const start = new Date(document.getElementById('dateStart').value);
    const end = new Date(document.getElementById('dateEnd').value);
    const mode = document.getElementById('priceMode').value;
    const t = translations[currentLang];

    const discBox = document.getElementById('disclaimer-box');
    const extraPanel = document.getElementById('extra-panel');
    const extraList = document.getElementById('extra-list');
    
    discBox.style.display = (mode === 'prop') ? 'block' : 'none';
    extraPanel.style.display = 'none';
    extraList.innerHTML = '';

    if (isNaN(start) || isNaN(end)) {
        document.getElementById('results').innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px; color:#94a3b8;">Wprowadź daty, aby zobaczyć wycenę</td></tr>';
        return;
    }
    
    const overlay = Math.max(0, Math.ceil((end - start) / (86400000)));
    document.getElementById('st-route').innerText = `PL → ${city}`;
    document.getElementById('st-overlay').innerText = `${overlay} ${overlay === 1 ? t.unit_day : t.unit_days}`;
    
    const dBus = transitDays[city] ? transitDays[city].BUS : '?';
    const dFtl = transitDays[city] ? transitDays[city].FTL : '?';
    document.getElementById('st-delivery').innerText = `${dBus}d / ${dFtl}d`;

    let finalResults = [];
    const ukCities = ["Londyn", "Liverpool", "Manchester"];
    const chCities = ["Bazylea", "Genewa"];
    const isUK = ukCities.includes(city);
    const isCH = chCities.includes(city);

    for (let carrierName in rates) {
        let c = rates[carrierName];
        if (!c.exp[city]) continue;

        let numVehicles = Math.ceil(weight / c.cap);
        if (numVehicles === 0) numVehicles = 1;

        let e = c.exp[city];
        let i = c.imp[city];
        let d = c.dniowki[city] || 0;
        let pTotal = c.postoj * overlay;
        let parkingTotal = parkingDailyRate * overlay;

        let extraCost = 0;
        let breakdownMsg = "";
        
        if (isUK) {
            if (c.type === 'SQM') {
                if (c.vClass === 'BUS') {
                    extraCost = 332 + 166 + 19;
                    breakdownMsg = "UK (SQM BUS): Prom €332, ATA €166, Mosty €19";
                } else {
                    extraCost = 522 + 166 + 19 + 69;
                    breakdownMsg = `UK (SQM ${c.vClass}): Prom €522, ATA €166, Mosty €19, Drogi €69`;
                }
            } else {
                extraCost = 166;
                breakdownMsg = `UK (${carrierName}): Karnet ATA €166`;
            }
        } else if (isCH) {
            extraCost = 166;
            breakdownMsg = `CH (${carrierName}): Karnet ATA €166`;
        }

        let totalForOne = e + i + d + pTotal + extraCost + parkingTotal;
        let finalCost = (mode === "full") ? totalForOne * numVehicles : (totalForOne / c.cap) * weight;
        let util = Math.min(100, (weight / (c.cap * numVehicles)) * 100);
        let dDays = (c.vClass === 'BUS') ? dBus : dFtl;

        finalResults.push({
            label: carrierName, type: c.type, vClass: c.vClass,
            cost: finalCost, dDays: dDays, util: util, count: numVehicles,
            breakdown: `Exp: €${e} | Imp: €${i} | Dniówka: €${d / 2} (1 str) / €${d} (kółko) | Postój: €${pTotal} | Parking: €${parkingTotal} | Opłaty: €${extraCost}`,
            msg: breakdownMsg,
            val: extraCost,
            parkingVal: parkingTotal
        });
    }

    finalResults.sort((a, b) => a.cost - b.cost);
    document.getElementById('st-best').innerText = finalResults.length > 0 ? finalResults[0].label : '-';

    const tbody = document.getElementById('results');
    tbody.innerHTML = '';
    
    let showPanel = false;
    finalResults.forEach(r => {
        const tr = document.createElement('tr');
        if(r.type === 'SQM') tr.className = 'row-sqm';
        tr.innerHTML = `
            <td>
                <span class="badge ${r.type==='SQM'?'badge-sqm':'badge-ext'}">${r.type}</span><br><b>${r.label}</b>
                <span class="breakdown-text">${r.breakdown}</span>
            </td>
            <td style="white-space:nowrap;">${r.count}x ${r.vClass}</td>
            <td style="width:140px;">
                <div style="font-size: 0.7rem; margin-bottom: 2px; font-weight:700; color:var(--sqm-blue);">${r.util.toFixed(1)}%</div>
                <div class="util-bg"><div class="util-fill" style="width: ${r.util}%"></div></div>
            </td>
            <td>${r.dDays} ${r.dDays === 1 ? t.unit_day : t.unit_days}</td>
            <td class="price-col">€ ${r.cost.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
        `;
        tbody.appendChild(tr);

        if (r.val > 0 || r.parkingVal > 0) {
            showPanel = true;
            const item = document.createElement('div');
            item.className = 'extra-item';
            let totalUnitExtra = r.val + r.parkingVal;
            item.innerHTML = `<span>${r.label} (${r.vClass})</span> <span>+ €${totalUnitExtra.toFixed(2)} / unit</span>`;
            
            const sub = document.createElement('div');
            sub.className = 'extra-sub';
            let msgText = `Parking: €${r.parkingVal} (${overlay}d x €30)`;
            if (r.msg) msgText += ` | ${r.msg}`;
            sub.innerText = msgText;
            extraList.appendChild(item);
            extraList.appendChild(sub);
        }
    });

    if (showPanel) extraPanel.style.display = 'block';
}

init();
function init() { calculate(); }
setLang('pl');
</script>
